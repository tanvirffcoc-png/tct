# ==============================================================================
# TCT Bot Full Configuration File (tctfile)
# Format: YAML
# ==============================================================================

# ------------------------------------------------------------------------------
# CORE SETTINGS
# Basic identification and operation parameters for the bot.
# ------------------------------------------------------------------------------
# Unique identifier for this specific bot session/instance.
SESSION_ID: "tct_c3f36a88"

# Timezone used for logging, scheduled tasks, and time-based commands.
# Use standard tz database names (e.g., "Africa/Nairobi", "America/New_York").
TIMEZONE: "Asia/Dhaka"

# Set to true to hide verbose debug/trace logs and keep the console clean.
FILTER_NOISE_LOGS: true

# The character(s) used to trigger bot commands (e.g., ".help", "!ping").
PREFIX: "."


# ------------------------------------------------------------------------------
# SERVER / DEPLOYMENT
# Settings for the local server environment.
# ------------------------------------------------------------------------------
# The port on which the web dashboard and internal API will run.
SERVER_PORT: 3003

# Path for IPC sockets. 
# NOTE: Leave this commented out unless you specifically require UNIX sockets.
#UNIX_SOCKET_PATH: "/tmp/my_app_1.sock"


# ------------------------------------------------------------------------------
# EXTERNAL API KEYS
# Credentials for third-party services. Keep these secure!
# Only uncomment the lines if you are actively using these services.
# ------------------------------------------------------------------------------
#OPENWEATHER_API_KEY: "" # Required for weather-related commands
#MISTRAL_API_KEY: ""     # Required for AI Chatbot commands (Currently unused)


# ------------------------------------------------------------------------------
# DATABASE SETTINGS
# Advanced configuration for database connection and performance tuning.
# ------------------------------------------------------------------------------
DATABASE:
  # SYNC_MODE: Controls how fast the bot writes to the database.
  # If your bot is lagging, hanging, or CPU usage is high, adjust this.
  #
  # Options:
  #   "OFF"    - Maximum Speed (God Mode). Instantly fixes lag on heavy bots.
  #              Warning: Slight risk of DB corruption if the server loses power.
  #   "NORMAL" - Balanced (Default). Good speed, safe from standard bot crashes.
  #   "FULL"   - Maximum Safety. Very slow, not recommended for busy bots.
  SYNC_MODE: "NORMAL"
  
  # Number of database operations to batch together before executing.
  BATCH_SIZE: 300
  
  # How often to flush batched operations to the database (in milliseconds, or string like "5s").
  FLUSH_INTERVAL: "5000"
  
  # Maximum memory the database can use for caching (Default: 134217728 = 128MB).
  CACHE_MAX_BYTES: 134217728
  
  # Enable Write-Ahead Logging for better concurrency and performance.
  USE_WAL: true
  
  # How long to wait when the database is locked before throwing an error (in milliseconds).
  BUSY_TIMEOUT_MS: 15000


# ------------------------------------------------------------------------------
# WEB DASHBOARD
# Settings for the bot's web management interface.
# ------------------------------------------------------------------------------
DASHBOARD:
  ENABLED: false
  # IMPORTANT: Change these default credentials before deploying to production!
  USER: "admin"
  PASSWORD: "tct-99"


# ------------------------------------------------------------------------------
# CLOUDINARY INTEGRATION
# Used for hosting and uploading media via URLs.
# Uncomment and fill out if your bot processes external media uploads.
# ------------------------------------------------------------------------------
#CLOUDINARY:
#  CLOUD_NAME: ""
#  API_KEY: ""
#  API_SECRET: ""


# ------------------------------------------------------------------------------
# MODERATION / LOCK SYSTEM
# Rules and automated actions for managing group/chat behavior.
# ------------------------------------------------------------------------------
LOCK_SYSTEM:
  # Number of warnings a user can receive before a penalty (kick/ban) is applied.
  MAX_WARNS: 3
  
  # The message sent when a user is warned. 
  # Available placeholders: {user}, {max_warns}, {remaining_warns}, {reason}
  WARN_MESSAGE: "*⚠️WARN MESSAGE⚠️*\n\n*USER:* {user}\n*MAX WARNINGS:* {max_warns}\n*REMAINING WARNINGS:* {remaining_warns}\n*REASON:* {reason}"
  
  # Fallback reason if an admin doesn't provide one when warning.
  DEFAULT_REASON: "Breaking group rules."
  
  # If true, the specific word/action that triggered the warning will be appended to the reason.
  SHOW_TRIGGER_IN_REASON: true
  
  # Auto-delete the warning message from the chat after this many minutes.
  DELETE_WARN_AFTER: 3


